name: Build desktop release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-installer:
    name: Windows x64 installer
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check TypeScript
        run: pnpm check

      - name: Run tests
        run: pnpm test

      - name: Test native audio engine
        run: cargo test --locked --manifest-path native/audio-engine/Cargo.toml

      - name: Build application for smoke test
        run: |
          pnpm build:native
          pnpm build

      - name: Smoke-test sandboxed Electron startup
        run: pnpm test:smoke

      - name: Build installer
        run: pnpm dist:installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoundGrid-Windows-Setup
          path: |
            release/SoundGrid-Setup-*.exe
            release/SoundGrid-Setup-*.exe.blockmap
            release/latest.yml
          if-no-files-found: error

      - name: Attach installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/SoundGrid-Setup-*.exe
            release/SoundGrid-Setup-*.exe.blockmap
            release/latest.yml

  macos-universal:
    name: macOS universal DMG
    runs-on: macos-15

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust with Intel cross-target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check TypeScript
        run: pnpm check

      - name: Run tests
        run: pnpm test

      - name: Test native audio engine
        run: cargo test --locked --manifest-path native/audio-engine/Cargo.toml

      - name: Build application for smoke test
        run: |
          pnpm build:native
          pnpm build

      - name: Smoke-test CoreAudio Electron startup
        run: pnpm test:smoke

      - name: Build universal DMG and update ZIP
        run: pnpm dist:mac
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoundGrid-macOS-Universal
          path: |
            release/SoundGrid-*-macOS-universal.dmg
            release/SoundGrid-*-macOS-universal.zip
            release/SoundGrid-*-macOS-universal.zip.blockmap
            release/latest-mac.yml
          if-no-files-found: error

      - name: Attach macOS builds to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/SoundGrid-*-macOS-universal.dmg
            release/SoundGrid-*-macOS-universal.zip
            release/SoundGrid-*-macOS-universal.zip.blockmap
            release/latest-mac.yml
