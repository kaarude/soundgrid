name: Build desktop release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-installer:
    name: Windows x64 installer
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check TypeScript
        run: pnpm check

      - name: Run tests
        run: pnpm test

      - name: Test native audio engine
        run: cargo test --locked --manifest-path native/audio-engine/Cargo.toml

      - name: Build application for smoke test
        run: |
          pnpm build:native
          pnpm build

      - name: Smoke-test sandboxed Electron startup
        run: pnpm test:smoke

      - name: Build installer
        run: pnpm dist:installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoundGrid-Windows-Setup
          path: |
            release/SoundGrid-Setup-*.exe
            release/SoundGrid-Setup-*.exe.blockmap
            release/latest.yml
          if-no-files-found: error

      - name: Attach installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release/SoundGrid-Setup-*.exe
            release/SoundGrid-Setup-*.exe.blockmap
            release/latest.yml

  macos-universal:
    name: macOS universal DMG
    runs-on: macos-15

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust with Intel cross-target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check TypeScript
        run: pnpm check

      - name: Run tests
        run: pnpm test

      - name: Test native audio engine
        run: cargo test --locked --manifest-path native/audio-engine/Cargo.toml

      - name: Build application for smoke test
        run: |
          pnpm build:native
          pnpm build

      - name: Smoke-test CoreAudio Electron startup
        run: pnpm test:smoke

      - name: Prepare macOS signing and notarization credentials
        shell: bash
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID_VALUE: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_VALUE: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID_VALUE: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [[ -n "$MAC_CSC_LINK" && -n "$MAC_CSC_KEY_PASSWORD" && -n "$APPLE_API_KEY_BASE64" && -n "$APPLE_API_KEY_ID_VALUE" && -n "$APPLE_API_ISSUER_VALUE" && -n "$APPLE_TEAM_ID_VALUE" ]]; then
            printf '%s' "$APPLE_API_KEY_BASE64" | base64 -D > "$RUNNER_TEMP/AuthKey.p8"
            chmod 600 "$RUNNER_TEMP/AuthKey.p8"
            {
              echo "CSC_LINK=$MAC_CSC_LINK"
              echo "CSC_KEY_PASSWORD=$MAC_CSC_KEY_PASSWORD"
              echo "APPLE_API_KEY=$RUNNER_TEMP/AuthKey.p8"
              echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID_VALUE"
              echo "APPLE_API_ISSUER=$APPLE_API_ISSUER_VALUE"
              echo "APPLE_TEAM_ID=$APPLE_TEAM_ID_VALUE"
              echo "SIGNED_MAC_RELEASE=true"
            } >> "$GITHUB_ENV"
          else
            if [[ "$GITHUB_REF" == refs/tags/* && "$GITHUB_REF_NAME" != *-* ]]; then
              echo "Stable macOS tags require every signing and notarization secret." >&2
              exit 1
            fi
            {
              echo "CSC_IDENTITY_AUTO_DISCOVERY=false"
              echo "SIGNED_MAC_RELEASE=false"
            } >> "$GITHUB_ENV"
          fi

      - name: Build universal DMG and update ZIP
        run: pnpm dist:mac

      - name: Verify universal packaged application
        shell: bash
        run: |
          set -euo pipefail
          app="release/mac-universal/SoundGrid.app"
          sidecar="$app/Contents/Resources/native/soundgrid-audio"
          package_version="$(node -p "require('./package.json').version")"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
            test "${tag_version%%-*}" = "$package_version"
          fi
          lipo "$sidecar" -verify_arch x86_64 arm64
          test "$(plutil -extract CFBundleShortVersionString raw "$app/Contents/Info.plist")" = "$package_version"
          test -n "$(plutil -extract NSMicrophoneUsageDescription raw "$app/Contents/Info.plist")"
          test -s release/latest-mac.yml
          grep -q 'SoundGrid-.*-macOS-universal.zip' release/latest-mac.yml
          hdiutil verify release/SoundGrid-*-macOS-universal.dmg
          unzip -tq release/SoundGrid-*-macOS-universal.zip
          SOUNDGRID_SMOKE_EXECUTABLE="$app/Contents/MacOS/SoundGrid" pnpm test:smoke

      - name: Verify Developer ID signature and notarization ticket
        if: env.SIGNED_MAC_RELEASE == 'true'
        shell: bash
        run: |
          set -euo pipefail
          app="release/mac-universal/SoundGrid.app"
          codesign --verify --deep --strict --verbose=2 "$app"
          spctl --assess --type execute --verbose=2 "$app"
          xcrun stapler validate "$app"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoundGrid-macOS-Universal
          path: |
            release/SoundGrid-*-macOS-universal.dmg
            release/SoundGrid-*-macOS-universal.zip
            release/SoundGrid-*-macOS-universal.zip.blockmap
            release/latest-mac.yml
          if-no-files-found: error

      - name: Attach macOS builds to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release/SoundGrid-*-macOS-universal.dmg
            release/SoundGrid-*-macOS-universal.zip
            release/SoundGrid-*-macOS-universal.zip.blockmap
            release/latest-mac.yml
