<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoundGrid · preview</title>
    <link rel="icon" href="/logo.svg" type="image/svg+xml" />
    <script>
      // Stub the Electron preload bridge so the renderer runs in a plain browser.
      // Provides sample clips so the populated grid state is exercised.
      // A second mode (?empty=1) returns no clips to exercise the first-run state.
      const empty = new URLSearchParams(location.search).get("empty") === "1";
      const SAMPLE = [
        {
          id: "1",
          name: "Air Horn",
          filePath: "",
          favorite: true,
          volume: 1,
          loop: false,
          broadcast: true,
        },
        {
          id: "2",
          name: "Rain Room",
          filePath: "",
          favorite: false,
          volume: 1,
          loop: true,
          broadcast: false,
        },
        {
          id: "3",
          name: "Intro Sting",
          filePath: "",
          favorite: true,
          volume: 1,
          loop: false,
          broadcast: true,
        },
        {
          id: "4",
          name: "Crowd Bed",
          filePath: "",
          favorite: false,
          volume: 1,
          loop: true,
          broadcast: true,
        },
        {
          id: "5",
          name: "Laser Sweep",
          filePath: "",
          favorite: false,
          volume: 1,
          loop: false,
          broadcast: true,
        },
        {
          id: "6",
          name: "Soft Piano",
          filePath: "",
          favorite: true,
          volume: 1,
          loop: false,
          broadcast: true,
        },
        {
          id: "7",
          name: "Bass Drop",
          filePath: "",
          favorite: false,
          volume: 1,
          loop: false,
          broadcast: true,
        },
        {
          id: "8",
          name: "Wind Loop",
          filePath: "",
          favorite: false,
          volume: 1,
          loop: true,
          broadcast: true,
        },
      ];
      const noop = async () => {};
      const previewSettings = {
        micOutputDeviceId: empty ? null : "cable-out",
        monitorDeviceId: "headphones",
        realMicDeviceId: "mic",
        passthrough: true,
        masterMicVolume: 0.9,
        monitorVolume: 0.8,
        overlap: "stop",
        headsetOnly: true,
        micOnly: false,
        theme: "dark",
        runOnStartup: false,
        minimizeToTray: true,
        autoSelectMic: true,
        onboardingComplete: !empty,
      };
      window.soundgrid = {
        getLibrary: async () => (empty ? [] : SAMPLE),
        importFiles: async (files) => [],
        removeClip: async (id) => {},
        updateClip: async (id, patch) => {
          const clip = SAMPLE.find((item) => item.id === id);
          if (clip) {
            const next = { ...patch };
            if (next.hotkey === null) delete next.hotkey;
            Object.assign(clip, next);
          }
          return {
            clip: { ...clip },
            hotkeys: { registered: [], failures: [] },
          };
        },
        onLibraryChanged: () => () => {},
        getSettings: async () => previewSettings,
        setSettings: async (patch) => ({
          settings: Object.assign(previewSettings, patch),
          hotkeys: { registered: [], failures: [] },
        }),
        listDevices: async () => ({
          micOutputs: [],
          monitors: [],
          realMics: [],
        }),
        onAudioEvent: () => () => {},
        getCableStatus: async () => ({
          supported: true,
          installed: false,
          canInstall: true,
          rebootRequired: false,
          message:
            "VB-CABLE is required to send clips into voice applications.",
        }),
        installCable: async () => ({
          supported: true,
          installed: false,
          canInstall: true,
          rebootRequired: true,
          message:
            "Installation finished. Restart Windows before using VB-CABLE.",
        }),
        openCableDonation: noop,
        playBoth: noop,
        micPlay: noop,
        micPause: noop,
        micResume: noop,
        micStop: noop,
        micStopAll: noop,
        micSetMute: noop,
        micSetVolume: noop,
        monitorPlay: noop,
        monitorPause: noop,
        monitorResume: noop,
        monitorStop: noop,
        monitorSetMute: noop,
        monitorSetVolume: noop,
        registerHotkeys: async () => ({ registered: [], failures: [] }),
        unregisterHotkeys: noop,
        pickAudioFiles: async () => [],
        getPathForFile: () => "",
      };
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
