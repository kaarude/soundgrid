        {
          id: "2",

          filePath: "",

          volume: 1,

        {

          filePath: "",
          category: "Stingers",
          volume: 1,
          loop: false,
          broadcast: true,

        {
          id: "4",
          name: "Crowd Bed",
          filePath: "",
          category: "Ambience",
          volume: 1,

        {

          filePath: "",

          volume: 1,

          filePath: "",
          category: "Ambience",
          volume: 1,
          loop: true,
          broadcast: true,
        },
      ];
      const noop = async () => {};
      window.soundgrid = {
        getLibrary: async () => (empty ? [] : SAMPLE),
        importFiles: async (files) => [],
        removeClip: async (id) => {},
        updateClip: async (id, patch) => {},
        getSettings: async () => ({
          micOutputDeviceId: empty ? null : "cable-out",
          monitorDeviceId: "headphones",
          realMicDeviceId: "mic",
          passthrough: true,
          masterMicVolume: 0.9,
          monitorVolume: 0.8,

          theme: "dark",

        setSettings: async (patch) => ({ ...patch }),

          realMics: [],

        pushDevices: async (d) => d,
        micPlay: noop,
        micPause: noop,
        micResume: noop,
        micStop: noop,
        micStopAll: noop,
        micSetMute: noop,
        micSetVolume: noop,
        monitorPlay: noop,
        monitorPause: noop,
        monitorStop: noop,
        monitorSetVolume: noop,
        registerHotkeys: noop,
        unregisterHotkeys: noop,
        pickAudioFiles: async () => [],
